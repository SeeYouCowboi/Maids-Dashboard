name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Run tests on every push and PR
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        # Vite outputs to ../static/ — required so StaticFiles mount succeeds

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q --tb=short

  # ─────────────────────────────────────────────
  # Job 2: Build frontend + deploy to server
  # Runs only on push to main (not on PRs)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        # Vite outputs to ../static/ (configured in vite.config.ts)
        # API calls use relative paths (/api/v1/...) so no env var needed

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync code to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.egg-info' \
            --exclude='venv' \
            --exclude='data' \
            --exclude='logs' \
            --exclude='.env' \
            --exclude='tests' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/maids-dashboard/"

      - name: Restart service
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            bash << 'REMOTE'
          set -e

          cd /opt/maids-dashboard

          # ── Phase 1: Stop service BEFORE any file changes ──────────
          # Prevents Restart=always from crash-looping if pip/rsync
          # destabilises the running process.
          systemctl stop maids-dashboard 2>/dev/null || true
          systemctl reset-failed maids-dashboard 2>/dev/null || true

          # Wait up to 15 s for port 18889 to be released
          for i in $(seq 1 15); do
            ss -tlnp | grep -q ':18889' || break
            [ "$i" -eq 1 ] && echo "Waiting for port 18889 to be released..."
            # After 5 s of polite waiting, start killing
            if [ "$i" -ge 5 ]; then
              fuser -k 18889/tcp 2>/dev/null || kill -9 $(ss -tlnp | grep ':18889' | grep -oP 'pid=\K[0-9]+') 2>/dev/null || true
            fi
            sleep 1
          done

          # Hard-fail if port is STILL occupied after 15 s
          if ss -tlnp | grep -q ':18889'; then
            echo "FATAL: port 18889 still occupied after 15s"
            ss -tlnp | grep ':18889' || true
            exit 1
          fi

          # ── Phase 2: Update while service is stopped ──────────────
          venv/bin/pip install -q -e .

          rm -rf /var/www/maids-dashboard/*
          cp -r static/. /var/www/maids-dashboard/

          # ── Phase 3: Start and verify ────────────────────────────
          systemctl start maids-dashboard
          sleep 5
          systemctl is-active --quiet maids-dashboard \
            && echo "Service is running" \
            || { echo "Service failed to start";
                 echo "=== err.log (last 50 lines) ===";
                 tail -50 /opt/maids-dashboard/logs/err.log 2>/dev/null || echo "(err.log not found)";
                 echo "=== systemd journal ===";
                 journalctl -u maids-dashboard --no-pager -n 20;
                 exit 1; }
          REMOTE
